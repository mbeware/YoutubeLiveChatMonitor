name: Update Date on Push

on:
  push:
    branches:
      - main
      - master

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Update date and time in file
        run: |
          # Format: YYYY-MM-DD HH:MM:SS UTC
          DATETIME=$(date +'%Y-%m-%d %H:%M:%S UTC')
          # Update the marker in your file (e.g., version.txt)
          sed -i "s/_Last updated:.*_/_Last updated: ${DATETIME}_/" version.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add version.txt
          # The || echo ensures the step doesn't fail if no changes were made
          git commit -m "chore: auto update last updated date" || echo "No changes to commit"
          git push
